<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX MIND - Панель администратора</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/admin/admin.css">

</head>

<body>

    <div id="loginScreen">
        <h2>Вход в панель APEX MIND</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Логин администратора</label>
                <input type="text" id="adminLogin" required placeholder="admin">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="adminPassword" required placeholder="Введите пароль">
            </div>
            <button type="submit" class="btn">Войти</button>
            <p id="loginError" style="color: red; display: none; margin-top: 15px;">Неверный логин или пароль!</p>
        </form>
    </div>

    <div id="dashboardScreen" class="container">
        <div class="dashboard-header">
            <h1>Панель администратора</h1>
            <button class="btn logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="table-container">
            <h2>Последние заявки на пилот</h2>
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Имя</th>
                        <th>Компания</th>
                        <th>Телефон</th>
                        <th>Email</th>
                        <th>Сообщение</th>
                    </tr>
                </thead>
                <tbody id="leadsTableBody">
                    <tr>
                        <td colspan="6">Загрузка данных...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="table-container">
            <h2>Статистика опросов (Всего пройдено: <span id="totalSurveys">0</span>)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Вопрос</th>
                        <th>Средний балл (от 1 до 5)</th>
                    </tr>
                </thead>
                <tbody id="surveyTableBody">
                    <tr>
                        <td colspan="2">Загрузка данных...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="scripts/admin.js"></script>

</html>
